<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fun</title>

</head>

<body>
    <canvas id="draw" width="500px" height="250px" onmousemove="draw(event)"></canvas>
</body>
</html>

<footer>
<script>
        
    console.log("test")

    let oldX = 0
    let oldY = 0

    let c = document.getElementById("draw")
    let ctx = c.getContext("2d")

    function draw(event)
    {        

        ctx.fillStyle = "#00000011"
        ctx.fillRect(0, 0, 500, 250)

        let x = event.offsetX
        let y = event.offsetY

        ctx.beginPath(); // Begin a new path
        ctx.moveTo(oldX, oldY); // Set starting point (x1, y1)
        ctx.lineTo(x, y); // Set ending point (x2, y2)
        ctx.strokeStyle = "red"; // Set line color
        ctx.lineWidth = 5; // Set line width
        ctx.stroke(); // Render the line

        oldX = x
        oldy = y

    }
</script>
</footer>
